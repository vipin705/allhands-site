<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Hands — Every player counts.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080A08;
      color: #F0FBE8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      color: #C4FF00;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 18px;
      color: #6A7A62;
      margin-bottom: 48px;
    }
    .description {
      max-width: 480px;
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
      color: #F0FBE8;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 24px;
    }
    .links a {
      color: #C4FF00;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .links a:hover { text-decoration: underline; }
    footer {
      margin-top: 64px;
      font-size: 13px;
      color: #6A7A62;
    }
  </style>
</head>
<body>
  <div class="logo">All Hands</div>
  <div class="tagline">Every player counts.</div>
  <div class="description">
    All Hands is a team management app for sports teams of all kinds.
    Coordinate availability, manage lineups, and stay connected — all in one place.
  </div>
  <div class="links">
    <a href="/privacy.html">Privacy Policy</a>
  </div>
  <footer>&copy; 2026 All Hands. All rights reserved.</footer>
</body>
</html>
